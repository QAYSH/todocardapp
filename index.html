<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Todo Card | Accessible Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #3b82f6;
            --brand-color-hover: #2563eb;
            --bg-neutral: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --radius: 24px;
            --radius-sm: 8px;
            --radius-pill: 9999px;
            
            /* Priority Colors */
            --priority-low: #10b981;
            --priority-medium: #f59e0b;
            --priority-high: #ef4444;
            
            /* Status Colors */
            --status-pending-bg: #f1f5f9;
            --status-pending-text: #475569;
            --status-done-bg: #d1fae5;
            --status-done-text: #065f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            line-height: 1.5;
        }

        main {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Focus Styles */
        :focus-visible {
            outline: 3px solid var(--brand-color);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        /* Card Container */
        .todo-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 520px;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .todo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.12);
        }

        /* Header Section */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .todo-title {
            font-size: clamp(1.25rem, 5vw, 1.75rem);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.2;
            transition: all 0.3s ease;
        }

        .todo-title.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Priority Badge */
        .priority-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .priority-badge[data-priority="Low"] { background: #ecfdf5; color: var(--priority-low); }
        .priority-badge[data-priority="Medium"] { background: #fffbeb; color: var(--priority-medium); }
        .priority-badge[data-priority="High"] { background: #fef2f2; color: var(--priority-high); }

        /* Description */
        .todo-description {
            font-size: 1rem;
            color: var(--text-secondary);
            transition: opacity 0.3s ease;
        }

        .todo-description.completed {
            opacity: 0.6;
        }

        /* Meta Info (Dates) */
        .meta-info {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .time-remaining {
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .time-remaining.future { color: var(--priority-low); }
        .time-remaining.soon { color: var(--priority-medium); }
        .time-remaining.urgent { color: #f97316; }
        .time-remaining.overdue { color: var(--priority-high); }

        /* Status & Toggle */
        .status-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8fafc;
            border-radius: var(--radius-sm);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-pill);
            transition: all 0.3s ease;
        }

        .status-indicator.pending {
            background: var(--status-pending-bg);
            color: var(--status-pending-text);
        }

        .status-indicator.done {
            background: var(--status-done-bg);
            color: var(--status-done-text);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-indicator.pending .status-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Custom Checkbox */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-wrapper {
            position: relative;
            width: 24px;
            height: 24px;
        }

        .real-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: #fff;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-container:hover .custom-checkbox {
            border-color: var(--brand-color);
        }

        .real-checkbox:checked ~ .custom-checkbox {
            background-color: var(--brand-color);
            border-color: var(--brand-color);
            transform: scale(1.05);
        }

        .custom-checkbox:after {
            content: "";
            position: absolute;
            display: none;
            left: 8px;
            top: 4px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .real-checkbox:checked ~ .custom-checkbox:after {
            display: block;
        }

        /* Tags */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag-chip {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.25rem 0.75rem;
            background: #f1f5f9;
            color: var(--text-secondary);
            border-radius: var(--radius-pill);
            transition: all 0.2s ease;
            cursor: default;
        }

        .tag-chip:hover {
            background: #e2e8f0;
            color: var(--text-primary);
        }

        /* Actions */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            min-width: 44px;
            min-height: 44px;
        }

        .btn-edit {
            background: #f1f5f9;
            color: var(--text-primary);
        }

        .btn-edit:hover {
            background: #e2e8f0;
        }

        .btn-delete {
            background: #fef2f2;
            color: var(--priority-high);
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* Responsive Overrides */
        @media (max-width: 480px) {
            .todo-card {
                padding: 1.25rem;
                border-radius: 20px;
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .meta-info {
                flex-direction: column;
                gap: 0.5rem;
            }
            .card-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Accessibility: High Contrast & Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <article class="todo-card" data-testid="test-todo-card">
            <div class="card-header">
                <h2 class="todo-title" id="todo-title" data-testid="test-todo-title">Design handoff review</h2>
                <span class="priority-badge" data-testid="test-todo-priority" data-priority="Medium" aria-label="Priority: Medium">Medium</span>
            </div>

            <p class="todo-description" data-testid="test-todo-description">
                Review final UI mockups, prepare feedback for design team, align component library.
            </p>

            <div class="meta-info">
                <div class="meta-item">
                    <span aria-hidden="true"></span>
                    <time class="due-date" data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z">Mar 1, 2026</time>
                </div>
                <div class="meta-item">
                    <span aria-hidden="true"></span>
                    <span class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Calculating...</span>
                </div>
            </div>

            <div class="status-section">
                <div class="status-indicator pending" data-testid="test-todo-status" aria-label="Task status: Pending">
                    <span class="status-dot"></span>
                    <span class="status-text">Pending</span>
                </div>

                <label class="toggle-container">
                    <span class="checkbox-wrapper">
                        <input type="checkbox" class="real-checkbox" data-testid="test-todo-complete-toggle" aria-label="Mark task as completed">
                        <span class="custom-checkbox"></span>
                    </span>
                    <span class="label-text">Complete</span>
                </label>
            </div>

            <div class="tags-container" data-testid="test-todo-tags">
                <span class="tag-chip" data-testid="test-todo-tag-work">Work</span>
                <span class="tag-chip" data-testid="test-todo-tag-urgent">Urgent</span>
                <span class="tag-chip" data-testid="test-todo-tag-design">Design</span>
            </div>

            <div class="card-actions">
                <button class="btn btn-edit" data-testid="test-todo-edit-button" aria-label="Edit task">
                    <span></span> Edit
                </button>
                <button class="btn btn-delete" data-testid="test-todo-delete-button" aria-label="Delete task">
                    <span></span> Delete
                </button>
            </div>
        </article>
    </main>
    

    <script>
        // Initial Data
        const todoData = {
            title: "Design handoff review",
            description: "Review final UI mockups, prepare feedback for design team, align component library.",
            priority: "Medium",
            status: "Pending",
            dueDate: new Date(2026, 2, 1, 18, 0, 0), // March 1, 2026 18:00 UTC
            tags: ["Work", "Urgent", "Design"]
        };

        // DOM Elements
        const card = document.querySelector('[data-testid="test-todo-card"]');
        const titleEl = document.querySelector('[data-testid="test-todo-title"]');
        const descEl = document.querySelector('[data-testid="test-todo-description"]');
        const statusEl = document.querySelector('[data-testid="test-todo-status"]');
        const statusText = statusEl.querySelector('.status-text');
        const checkbox = document.querySelector('[data-testid="test-todo-complete-toggle"]');
        const timeRemainingEl = document.querySelector('[data-testid="test-todo-time-remaining"]');
        const editBtn = document.querySelector('[data-testid="test-todo-edit-button"]');
        const deleteBtn = document.querySelector('[data-testid="test-todo-delete-button"]');

        // Logic: Time Remaining
        function updateTimeRemaining() {
            const now = new Date();
            const diff = todoData.dueDate - now;
            const absDiff = Math.abs(diff);
            
            const minutes = Math.floor(absDiff / (1000 * 60));
            const hours = Math.floor(absDiff / (1000 * 60 * 60));
            const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));

            let text = "";
            let colorClass = "";

            if (diff > 0) {
                // Future
                if (days > 2) {
                    text = `Due in ${days} days`;
                    colorClass = days > 3 ? "future" : "soon";
                } else if (days >= 1) {
                    text = "Due tomorrow";
                    colorClass = "soon";
                } else if (hours >= 1) {
                    text = `Due in ${hours} hours`;
                    colorClass = "urgent";
                } else if (minutes >= 1) {
                    text = `Due in ${minutes} minutes`;
                    colorClass = "urgent";
                } else {
                    text = "Due now!";
                    colorClass = "urgent";
                }
            } else {
                // Overdue
                if (days >= 1) {
                    text = `Overdue by ${days} days`;
                } else if (hours >= 1) {
                    text = `Overdue by ${hours} hours`;
                } else {
                    text = `Overdue by ${minutes} minutes`;
                }
                colorClass = "overdue";
            }

            timeRemainingEl.textContent = text;
            timeRemainingEl.className = `time-remaining ${colorClass}`;
        }

        // Logic: Toggle Complete
        checkbox.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            
            if (isChecked) {
                titleEl.classList.add('completed');
                descEl.classList.add('completed');
                statusEl.classList.remove('pending');
                statusEl.classList.add('done');
                statusText.textContent = "Done";
                statusEl.setAttribute('aria-label', 'Task status: Done');
            } else {
                titleEl.classList.remove('completed');
                descEl.classList.remove('completed');
                statusEl.classList.remove('done');
                statusEl.classList.add('pending');
                statusText.textContent = "Pending";
                statusEl.setAttribute('aria-label', 'Task status: Pending');
            }
        });

        // Logic: Edit & Delete
        editBtn.addEventListener('click', () => {
            console.log("[Todo Card] Edit clicked — Task ID: todo-001");
            alert("✏️ Edit mode (demo): In production, this would open a modal to edit title, description, due date, etc.");
        });

        deleteBtn.addEventListener('click', () => {
            console.log("[Todo Card] Delete clicked — Task ID: todo-001");
            const confirmed = confirm("⚠️ Delete this task? This action cannot be undone.");
            if (confirmed) {
                alert(" Task deleted (demo). Card would be removed in production.");
                // card.remove();
            }
        });

        // Initialization
        updateTimeRemaining();
        setInterval(updateTimeRemaining, 35000);

        // Console Verification Script
        const requiredIds = [
            'test-todo-card', 'test-todo-title', 'test-todo-description',
            'test-todo-priority', 'test-todo-due-date', 'test-todo-time-remaining',
            'test-todo-status', 'test-todo-complete-toggle', 'test-todo-tags',
            'test-todo-tag-work', 'test-todo-tag-urgent', 'test-todo-edit-button',
            'test-todo-delete-button'
        ];

        console.log("--- Automated Test Verification ---");
        requiredIds.forEach(id => {
            const el = document.querySelector(`[data-testid="${id}"]`);
            console.log(`${id}: ${el ? '✅' : '❌'} ${el ? el.tagName : 'MISSING'}`);
        });
    </script>
</body>
</html>
